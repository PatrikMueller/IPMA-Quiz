name: CI/CD - Lint, Build & Deploy to GitHub Pages

on:
  push:
    branches: ['**']  # Trigger on all branches
  pull_request:
    branches: [main, master]
  delete:  # Trigger when branches are deleted

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: 'Lint Code'
    runs-on: ubuntu-latest
    if: github.event_name != 'delete'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd src
          npm ci
          
      - name: Run ESLint
        run: |
          cd src
          npm run lint
        continue-on-error: true  # Don't fail deployment if linting fails

  build-and-deploy:
    name: 'Build & Deploy'
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'delete'
    
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd src
          npm ci
          
      - name: Get branch name
        id: branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "name=" >> $GITHUB_OUTPUT
            echo "path=" >> $GITHUB_OUTPUT
          else
            branch_name=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            echo "name=$branch_name" >> $GITHUB_OUTPUT
            echo "path=$branch_name/" >> $GITHUB_OUTPUT
          fi
          
      - name: Build Next.js app
        run: |
          cd src
          export NEXT_PUBLIC_BASE_PATH="/${{ steps.branch.outputs.path }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export BRANCH_NAME="${{ steps.branch.outputs.name }}"
          npm run build
          
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        
      - name: Initialize gh-pages if needed
        run: |
          if [ ! -d "gh-pages" ]; then
            mkdir gh-pages
            cd gh-pages
            git init
            git remote add origin https://github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            echo '{"deployments":[]}' > .deployments.json
            touch .nojekyll
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add .
            git commit -m "Initialize gh-pages branch"
          fi
          
      - name: Deploy to branch directory
        run: |
          cd gh-pages
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Remove existing deployment for this branch
          if [ -n "${{ steps.branch.outputs.name }}" ] && [ -d "${{ steps.branch.outputs.name }}" ]; then
            rm -rf "${{ steps.branch.outputs.name }}"
          elif [ -z "${{ steps.branch.outputs.name }}" ]; then
            # Main branch - remove root files but keep directories
            find . -maxdepth 1 -type f ! -name '.deployments.json' ! -name '.nojekyll' ! -name '.git*' -delete
            find . -maxdepth 1 -name '_next' -type d -exec rm -rf {} + 2>/dev/null || true
          fi
          
          # Copy new build
          if [ -n "${{ steps.branch.outputs.name }}" ]; then
            mkdir -p "${{ steps.branch.outputs.name }}"
            cp -r ../src/out/* "${{ steps.branch.outputs.name }}/"
          else
            cp -r ../src/out/* ./
          fi
          
          # Update deployments tracking
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [ -f .deployments.json ]; then
            # Remove existing entry for this branch and add new one
            branch_filter='.'
            if [ -n "${{ steps.branch.outputs.name }}" ]; then
              branch_filter=".deployments |= map(select(.branch != \"${{ steps.branch.outputs.name }}\"))"
            else
              branch_filter=".deployments |= map(select(.branch != \"main\" and .branch != \"master\"))"
            fi
            
            temp_file=$(mktemp)
            echo "{\"deployments\":[]}" | jq "$branch_filter" > temp_deployments.json
            
            branch_name="${{ steps.branch.outputs.name }}"
            if [ -z "$branch_name" ]; then
              branch_name="main"
            fi
            
            jq ".deployments += [{\"branch\": \"$branch_name\", \"path\": \"${{ steps.branch.outputs.path }}\", \"deployed_at\": \"$current_time\", \"commit\": \"${{ github.sha }}\"}]" temp_deployments.json > .deployments.json
            rm temp_deployments.json
          else
            branch_name="${{ steps.branch.outputs.name }}"
            if [ -z "$branch_name" ]; then
              branch_name="main"
            fi
            echo "{\"deployments\":[{\"branch\": \"$branch_name\", \"path\": \"${{ steps.branch.outputs.path }}\", \"deployed_at\": \"$current_time\", \"commit\": \"${{ github.sha }}\"}]}" > .deployments.json
          fi
          
          # Commit and push
          git add .
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy ${{ steps.branch.outputs.name || 'main' }} branch - ${{ github.sha }}"
            git push origin gh-pages
          fi
          
      - name: Comment on PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const baseUrl = 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}';
            const branchPath = '${{ steps.branch.outputs.path }}';
            const deployUrl = `${baseUrl}/${branchPath}`;
            
            const comment = `🚀 **Preview deployment ready!**
            
            📍 **Branch**: \`${{ steps.branch.outputs.name || 'main' }}\`
            🔗 **URL**: ${deployUrl}
            📝 **Commit**: \`${{ github.sha }}\`
            
            This preview will be automatically updated with new commits to this branch.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  cleanup:
    name: 'Cleanup Deleted Branch'
    runs-on: ubuntu-latest
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        
      - name: Remove branch deployment
        if: success()
        run: |
          deleted_branch="${{ github.event.ref }}"
          sanitized_branch=$(echo "$deleted_branch" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          
          echo "Cleaning up deployment for deleted branch: $deleted_branch (sanitized: $sanitized_branch)"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Remove branch directory if it exists
          if [ -d "$sanitized_branch" ]; then
            rm -rf "$sanitized_branch"
            echo "Removed directory: $sanitized_branch"
          fi
          
          # Update deployments tracking
          if [ -f .deployments.json ]; then
            temp_file=$(mktemp)
            jq ".deployments |= map(select(.branch != \"$deleted_branch\" and .branch != \"$sanitized_branch\"))" .deployments.json > "$temp_file"
            mv "$temp_file" .deployments.json
            echo "Updated deployments tracking"
          fi
          
          # Commit changes if any
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Cleanup deployment for deleted branch: $deleted_branch"
            git push origin gh-pages
            echo "Changes committed and pushed"
          else
            echo "No changes to commit"
          fi
