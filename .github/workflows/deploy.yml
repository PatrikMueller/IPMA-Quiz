name: CI/CD - Lint, Build & Deploy to GitHub Pages

on:
  push:
    branches: ['**']  # Trigger on all branches
  pull_request:
    branches: [main, master]
  delete:  # Trigger when branches are deleted

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: 'Lint Code'
    runs-on: ubuntu-latest
    if: github.event_name != 'delete'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd src
          npm ci
          
      - name: Run ESLint
        run: |
          cd src
          npm run lint
        continue-on-error: true  # Don't fail deployment if linting fails

  build-and-deploy:
    name: 'Build & Deploy'
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'delete'
    
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd src
          npm ci
          
      - name: Get branch name
        id: branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "name=" >> $GITHUB_OUTPUT
            echo "path=" >> $GITHUB_OUTPUT
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            branch_name=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            echo "name=$branch_name" >> $GITHUB_OUTPUT
            echo "path=$branch_name/" >> $GITHUB_OUTPUT
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Build Next.js app
        run: |
          cd src
          export NEXT_PUBLIC_BASE_PATH="/${{ steps.branch.outputs.path }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export BRANCH_NAME="${{ steps.branch.outputs.name }}"
          npm run build
          
      # For main branch: use GitHub Pages Actions (official method)
      - name: Setup Pages (Main Branch)
        if: steps.branch.outputs.is_main == 'true'
        uses: actions/configure-pages@v4
        
      - name: Create combined deployment (Main Branch)
        if: steps.branch.outputs.is_main == 'true'
        run: |
          mkdir -p pages-deployment
          
          # Check if gh-pages branch exists to get existing branch deployments
          git fetch origin gh-pages:gh-pages 2>/dev/null || echo "No gh-pages branch found"
          
          if git show-branch gh-pages 2>/dev/null; then
            # Copy existing branch deployments from gh-pages
            git checkout gh-pages
            for dir in */; do
              if [ -d "$dir" ] && [ "$dir" != "_next/" ] && [ "$dir" != ".git/" ]; then
                echo "Preserving existing branch deployment: $dir"
                cp -r "$dir" pages-deployment/
              fi
            done
            git checkout ${{ github.ref_name }}
          fi
          
          # Add main branch deployment to root
          cp -r src/out/* pages-deployment/
          
          # Update deployment tracking
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"main_deployed_at\": \"$current_time\", \"commit\": \"${{ github.sha }}\"}" > pages-deployment/.main-deployment.json
          
      - name: Upload Pages artifact (Main Branch)
        if: steps.branch.outputs.is_main == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-deployment
          
      - name: Deploy to GitHub Pages (Main Branch)
        if: steps.branch.outputs.is_main == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
        
      # For feature branches: use gh-pages branch method
      - name: Checkout gh-pages branch (Feature Branch)
        if: steps.branch.outputs.is_main == 'false'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        
      - name: Initialize gh-pages if needed (Feature Branch)
        if: steps.branch.outputs.is_main == 'false'
        run: |
          if [ ! -d "gh-pages-branch" ]; then
            mkdir gh-pages-branch
            cd gh-pages-branch
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            echo '{"branch_deployments":[]}' > .branch-deployments.json
            touch .nojekyll
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
          else
            cd gh-pages-branch
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
          fi
          
      - name: Update branch deployment (Feature Branch)
        if: steps.branch.outputs.is_main == 'false'
        run: |
          cd gh-pages-branch
          
          # Remove existing deployment for this branch
          if [ -d "${{ steps.branch.outputs.name }}" ]; then
            rm -rf "${{ steps.branch.outputs.name }}"
          fi
          
          # Add new deployment
          mkdir -p "${{ steps.branch.outputs.name }}"
          cp -r ../src/out/* "${{ steps.branch.outputs.name }}/"
          
          # Update tracking
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          if [ -f .branch-deployments.json ]; then
            temp_file=$(mktemp)
            jq ".branch_deployments |= map(select(.branch != \"${{ steps.branch.outputs.name }}\"))" .branch-deployments.json > "$temp_file"
            jq ".branch_deployments += [{\"branch\": \"${{ steps.branch.outputs.name }}\", \"path\": \"${{ steps.branch.outputs.path }}\", \"deployed_at\": \"$current_time\", \"commit\": \"${{ github.sha }}\"}]" "$temp_file" > .branch-deployments.json
            rm "$temp_file"
          else
            echo "{\"branch_deployments\":[{\"branch\": \"${{ steps.branch.outputs.name }}\", \"path\": \"${{ steps.branch.outputs.path }}\", \"deployed_at\": \"$current_time\", \"commit\": \"${{ github.sha }}\"}]}" > .branch-deployments.json
          fi
          
          # Commit and push to gh-pages
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Deploy branch: ${{ steps.branch.outputs.name }} - ${{ github.sha }}"
            git push origin gh-pages
            echo "Branch deployment updated in gh-pages"
          fi
          
      - name: Comment on PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const baseUrl = 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}';
            const branchPath = '${{ steps.branch.outputs.path }}';
            const deployUrl = `${baseUrl}/${branchPath}`;
            
            const comment = `🚀 **Preview deployment ready!**
            
            📍 **Branch**: \`${{ steps.branch.outputs.name || 'main' }}\`
            🔗 **URL**: ${deployUrl}
            📝 **Commit**: \`${{ github.sha }}\`
            
            This preview will be automatically updated with new commits to this branch.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  cleanup:
    name: 'Cleanup Deleted Branch'
    runs-on: ubuntu-latest
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        
      - name: Remove branch deployment
        if: success()
        run: |
          deleted_branch="${{ github.event.ref }}"
          sanitized_branch=$(echo "$deleted_branch" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          
          echo "Cleaning up deployment for deleted branch: $deleted_branch (sanitized: $sanitized_branch)"
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Remove branch directory if it exists
          if [ -d "$sanitized_branch" ]; then
            rm -rf "$sanitized_branch"
            echo "Removed directory: $sanitized_branch"
          fi
          
          # Update deployments tracking
          if [ -f .deployments.json ]; then
            temp_file=$(mktemp)
            jq ".deployments |= map(select(.branch != \"$deleted_branch\" and .branch != \"$sanitized_branch\"))" .deployments.json > "$temp_file"
            mv "$temp_file" .deployments.json
            echo "Updated deployments tracking"
          fi
          
          # Commit changes if any
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Cleanup deployment for deleted branch: $deleted_branch"
            git push origin gh-pages
            echo "Changes committed and pushed"
          else
            echo "No changes to commit"
          fi
