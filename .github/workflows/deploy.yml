name: CI/CD - Lint, Build & Deploy to GitHub Pages

on:
  push:
    branches: ['**']  # Trigger on all branches
  pull_request:
    branches: [main, master]
  delete:  # Trigger when branches are deleted

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: 'Lint Code'
    runs-on: ubuntu-latest
    if: github.event_name != 'delete'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd src
          npm ci
          
      - name: Run ESLint
        run: |
          cd src
          npm run lint
        continue-on-error: true

  build-and-deploy:
    name: 'Build & Deploy'
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'delete'
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd src
          npm ci
          
      - name: Get branch name
        id: branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "name=" >> $GITHUB_OUTPUT
            echo "path=" >> $GITHUB_OUTPUT
          else
            branch_name=$(echo ${GITHUB_REF#refs/heads/} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
            echo "name=$branch_name" >> $GITHUB_OUTPUT
            echo "path=$branch_name/" >> $GITHUB_OUTPUT
          fi
          
      - name: Build Next.js app
        run: |
          cd src
          export NEXT_PUBLIC_BASE_PATH="/${{ steps.branch.outputs.path }}"
          npm run build
          
      - name: Deploy to gh-pages
        run: |
          # Clone or create gh-pages branch
          if git ls-remote --heads origin gh-pages | grep gh-pages; then
            git clone --single-branch --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-repo
          else
            mkdir gh-pages-repo
            cd gh-pages-repo
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            touch .nojekyll
            echo '{"deployments":[]}' > .deployments.json
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add .
            git commit -m "Initialize gh-pages"
            git push -u origin gh-pages
            cd ..
            git clone --single-branch --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-repo
          fi
          
          cd gh-pages-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Remove old deployment for this branch
          if [ -n "${{ steps.branch.outputs.name }}" ]; then
            rm -rf "${{ steps.branch.outputs.name }}"
          else
            # Main branch - remove root files but preserve branch directories
            find . -maxdepth 1 -type f ! -name '.git*' ! -name '.deployments.json' ! -name '.nojekyll' -delete
            find . -maxdepth 1 -name '_next' -type d -exec rm -rf {} + 2>/dev/null || true
          fi
          
          # Deploy new build
          if [ -n "${{ steps.branch.outputs.name }}" ]; then
            mkdir -p "${{ steps.branch.outputs.name }}"
            cp -r ../src/out/* "${{ steps.branch.outputs.name }}/"
          else
            cp -r ../src/out/* ./
          fi
          
          # Update tracking file
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          branch_name="${{ steps.branch.outputs.name }}"
          if [ -z "$branch_name" ]; then
            branch_name="main"
          fi
          
          if [ -f .deployments.json ]; then
            temp_file=$(mktemp)
            jq --arg branch "$branch_name" --arg path "${{ steps.branch.outputs.path }}" --arg time "$current_time" --arg commit "${{ github.sha }}" '
              .deployments |= map(select(.branch != $branch)) + [{"branch": $branch, "path": $path, "deployed_at": $time, "commit": $commit}]' \
              .deployments.json > "$temp_file" && mv "$temp_file" .deployments.json
          else
            echo "{\"deployments\":[{\"branch\": \"$branch_name\", \"path\": \"${{ steps.branch.outputs.path }}\", \"deployed_at\": \"$current_time\", \"commit\": \"${{ github.sha }}\"}]}" > .deployments.json
          fi
          
          # Commit and push
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy $branch_name - ${{ github.sha }}"
            git push origin gh-pages
          fi
          
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.branch.outputs.name }}';
            const baseUrl = 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}';
            const deployUrl = branch ? `${baseUrl}/${branch}/` : baseUrl;
            
            const comment = `🚀 **Preview deployment ready!**
            
            📍 **Branch**: \`${branch || 'main'}\`
            🔗 **URL**: ${deployUrl}
            📝 **Commit**: \`${{ github.sha }}\`
            
            This preview will be automatically updated with new commits.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  cleanup:
    name: 'Cleanup Deleted Branch'
    runs-on: ubuntu-latest
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    
    permissions:
      contents: write
    
    steps:
      - name: Remove branch deployment
        run: |
          deleted_branch="${{ github.event.ref }}"
          sanitized_branch=$(echo "$deleted_branch" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          
          if git ls-remote --heads origin gh-pages | grep gh-pages; then
            git clone --single-branch --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-repo
            cd gh-pages-repo
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            
            if [ -d "$sanitized_branch" ]; then
              rm -rf "$sanitized_branch"
              echo "Removed deployment for branch: $sanitized_branch"
              
              # Update tracking
              if [ -f .deployments.json ]; then
                temp_file=$(mktemp)
                jq --arg branch "$deleted_branch" --arg sanitized "$sanitized_branch" '
                  .deployments |= map(select(.branch != $branch and .branch != $sanitized))' \
                  .deployments.json > "$temp_file" && mv "$temp_file" .deployments.json
              fi
              
              git add .
              if ! git diff --cached --quiet; then
                git commit -m "Remove deployment for deleted branch: $deleted_branch"
                git push origin gh-pages
              fi
            fi
          fi
